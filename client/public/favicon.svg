<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Keycap depth -->
    <linearGradient id="cap" x1="32" y1="2" x2="32" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2d2d2a"/>
      <stop offset="1" stop-color="#181816"/>
    </linearGradient>
    <!-- Brand bolt: green -> cyan -->
    <linearGradient id="bolt" x1="20" y1="8" x2="44" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a6e22e"/>
      <stop offset="1" stop-color="#66d9ef"/>
    </linearGradient>
  </defs>

  <!-- Keycap -->
  <rect x="3" y="3" width="58" height="58" rx="15" fill="url(#cap)"/>
  <rect x="3.75" y="3.75" width="56.5" height="56.5" rx="14.25" fill="none" stroke="#3c3c37" stroke-width="1.5"/>
  <!-- Top bevel highlight -->
  <rect x="9" y="8" width="46" height="20" rx="9" fill="#ffffff" opacity="0.04"/>

  <!-- Lightning bolt (the "blitz") -->
  <path d="M37.5 7 L17 35.5 a1.6 1.6 0 0 0 1.3 2.5 H29 L25.5 55.5 a0.8 0.8 0 0 0 1.45 0.6 L47.2 27.6 a1.6 1.6 0 0 0 -1.3 -2.5 H35.6 L40 9.2 a1.4 1.4 0 0 0 -2.5 -2.2 Z"
        fill="url(#bolt)"/>

  <!-- Typing caret: a blinking-style cursor underscore -->
  <rect x="40" y="48" width="13" height="4" rx="2" fill="#f92672"/>
</svg>
