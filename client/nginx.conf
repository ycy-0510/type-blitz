# Backend (Socket.IO) — resolved via the docker-compose service name.
upstream typeblitz_backend {
    server server:3001;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy Socket.IO (WebSocket + long-polling) to the backend,
    # so the whole app lives on a single origin behind cloudflared.
    location /socket.io/ {
        proxy_pass http://typeblitz_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass Cloudflare's real-visitor IP through to the server (used for
        # Turnstile remoteip). cloudflared sets CF-Connecting-IP upstream.
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 86400;
    }

    # SPA fallback for Vue Router (history mode).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
