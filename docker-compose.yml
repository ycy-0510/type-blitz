version: '3.8'

# Single exposed port: cloudflared / the browser only ever touch the client
# (nginx :80). nginx reverse-proxies /socket.io/ to the server over the
# internal compose network, so the backend needs no published port.

services:
  server:
    build: ./server
    # No published port — reached internally as "server:3001" by nginx.
    environment:
      - PORT=3001
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      # Special edition: custom first-match quote (optional).
      - CUSTOM_QUOTE=${CUSTOM_QUOTE:-}
      - CUSTOM_QUOTE_SOURCE=${CUSTOM_QUOTE_SOURCE:-Special Edition}
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY}
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped
